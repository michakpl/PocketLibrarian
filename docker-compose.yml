services:
  db:
    image: mcr.microsoft.com/mssql/server:2025-latest
    platform: linux/amd64
    environment:
      ACCEPT_EULA: "Y"
      # Local dev password — not a production secret
      MSSQL_SA_PASSWORD: "Dev_Password123!"
    ports:
      - "1433:1433"
    volumes:
      - sqldata:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'Dev_Password123!' -Q 'SELECT 1' -b -o /dev/null 2>/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: src/PocketLibrarian.API/Dockerfile
    image: pocketlibrarian-api
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: "Server=db,1433;Database=PocketLibrarian;User Id=sa;Password=Dev_Password123!;TrustServerCertificate=True;"
      Redis__ConnectionString: "redis:6379"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  sqldata:
  redisdata:
